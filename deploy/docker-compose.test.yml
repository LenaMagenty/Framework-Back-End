services:
  postgres-university:
    image: postgres:17
    container_name: postgres-university-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: university
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d university']
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    image: mekidmetal/auth-service
    container_name: auth-service-test
    ports:
      - '18000:8000'
    depends_on:
      postgres-university:
        condition: service_healthy

  university-service:
    image: mekidmetal/university-service
    container_name: university-service-test
    ports:
      - '18001:8000'
    depends_on:
      postgres-university:
        condition: service_healthy

  tests:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: backend-tests
    depends_on:
      postgres-university:
        condition: service_healthy
      auth-service:
        condition: service_started
      university-service:
        condition: service_started
    environment:
      AUTH_SERVICE_API_URL: 'http://auth-service:8000'
      UNIVERSITY_SERVICE_API_URL: 'http://university-service:8000'
    command: [ "pytest", "-q", "--alluredir=/app/allure-results" ]