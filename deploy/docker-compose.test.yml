services:

  postgres_auth:
    image: 'postgres:17'
    container_name: 'postgres-auth-test'
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: '1234'
      POSTGRES_DB: 'auth'
    ports:
      - '55430:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d auth']
      interval: 5s
      timeout: 5s
      retries: 20

  postgres_university:
    image: 'postgres:17'
    container_name: 'postgres-university-test'
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: '1234'
      POSTGRES_DB: 'university'
    ports:
      - '55432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d university']
      interval: 5s
      timeout: 5s
      retries: 20

  auth:
    image: 'mekidmetal/auth-service'
    container_name: 'auth-service-test'
    environment:
      UNIVERSITY_SERVICE_INTERNAL_URL: 'http://university:8000'
      UNIVERSITY_SERVICE_API_URL: 'http://university:8000'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: '1234'
      POSTGRES_DB: 'auth'
      POSTGRES_HOST: 'postgres_auth'
      POSTGRES_PORT: '5432'
    ports:
      - '18000:8000'
    depends_on:
      postgres_auth:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8000/docs >/dev/null || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30

  university:
    image: 'mekidmetal/university-service'
    container_name: 'university-service-test'
    environment:
      AUTH_SERVICE_INTERNAL_URL: 'http://auth:8000'
      AUTH_SERVICE_API_URL: 'http://auth:8000'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: '1234'
      POSTGRES_DB: 'university'
      POSTGRES_HOST: 'postgres_university'
      POSTGRES_PORT: '5432'
    ports:
      - '18001:8000'
    depends_on:
      postgres_university:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8000/docs >/dev/null || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30

  tests:
    build:
      context: '..'
      dockerfile: 'Dockerfile'
    container_name: 'backend-tests'
    depends_on:
      auth:
        condition: service_healthy
      university:
        condition: service_healthy
    environment:
      AUTH_SERVICE_API_URL: 'http://auth:8000'
      UNIVERSITY_SERVICE_API_URL: 'http://university:8000'
    command:
      [
        'sh', '-c',
        "echo 'Waiting services...' && \
         curl -fsS http://auth:8000/docs >/dev/null && \
         curl -fsS http://university:8000/docs >/dev/null && \
         pytest -q --alluredir=/app/allure-results"
      ]