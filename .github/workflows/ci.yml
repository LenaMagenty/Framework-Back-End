name: Framework Back-End CI/CD

on:
  pull_request:
    branches: [ 'main' ]

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: ruff check .

      - name: Start system with Docker Compose
        run: |
          docker compose up -d --no-build
          docker compose ps

      - name: Compose logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color

      - name: Wait for services to be ready
        run: |
          wait_url () {
            url="$1"
            echo "Waiting for $url"
            for i in {1..60}; do
              if curl -fsS "$url" > /dev/null; then
                echo "READY: $url"
                return 0
              fi
              sleep 2
            done
            echo "NOT READY: $url"
            docker compose ps
            docker compose logs --no-color
            return 1
          }

          wait_url "http://127.0.0.1:8000/docs"
          wait_url "http://127.0.0.1:8001/docs"

      - name: Build tests image
        run: docker build -t api-tests:ci .

      - name: Run tests in Docker (host network)
        run: |
          rm -rf artifacts
          mkdir -p artifacts/allure-results
          docker run --rm \
            --network host \
            -v "${PWD}/artifacts/allure-results:/app/allure-results" \
            api-tests:ci

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre wget tar
          wget -q https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.29.0/allure-commandline-2.29.0.tgz
          tar -xzf allure-commandline-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Generate Allure report
        if: always()
        run: |
          rm -rf artifacts/allure-report
          mkdir -p artifacts/allure-report
          allure generate artifacts/allure-results -o artifacts/allure-report --clean

      - name: Stop system
        if: always()
        run: docker compose down -v

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/allure-report

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4