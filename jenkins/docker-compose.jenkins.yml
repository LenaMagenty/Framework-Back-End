version: '3.9'

services:
  jenkins:
    image: jenkins/jenkins:2.552-jdk21
    container_name: jenkins
    user: root
    ports:
      - '8080:8080'
      - '50000:50000'
    environment:
      - JENKINS_SLAVE_AGENT_PORT=50000
    volumes:
      - jenkins_home:/var/jenkins_home
      # даём Jenkins доступ к Docker Engine
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - jenkins-net

  backend-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: backend-agent
    user: root
    depends_on:
      - jenkins
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=backend-agent
      - JENKINS_SECRET=4b6aad7cd2328c9a90af9908f1926d6330eae1a8432fd2e9641647dc5186d451
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
    volumes:
      - agent_workdir:/home/jenkins/agent
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - jenkins-net

volumes:
  jenkins_home:
  agent_workdir:

networks:
  jenkins-net:
    driver: bridge